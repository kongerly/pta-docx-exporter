<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>题目列表</title>
  </head>
  <body>
    <main>
      <div class="flex flex-col m-4 mb-0 flex-1">
        <div class="pc-x pt-2 pl-4 scroll-mt-0" id="inline-multi">
          <div class="flex flex-wrap gap-2">
            <div class="flex flex-wrap gap-2 grow">
              <button type="button">
                <div class="text-xs">5-1</div>
              </button>
              <div class="font-bold">多选题：网络协议</div>
            </div>
          </div>
          <div class="mt-4">
            <h2>题目描述</h2>
            <p>下列属于应用层协议的是（多选）。</p>
            <p>A. HTTP</p>
            <p>B. SMTP</p>
            <p>C. UDP</p>
            <p>D. DNS</p>
          </div>
          <div>评测结果</div>
          <div>参考答案</div>
        </div>

        <div class="pc-x pt-2 pl-4 scroll-mt-0" id="inline-judge">
          <div class="flex flex-wrap gap-2">
            <div class="flex flex-wrap gap-2 grow">
              <button type="button">
                <div class="text-xs">5-2</div>
              </button>
              <div class="font-bold">判断题：TCP 基础</div>
            </div>
          </div>
          <div class="mt-4">
            <h2>题目描述</h2>
            <p>TCP 是面向连接的传输层协议。</p>
            <p>T. 正确</p>
            <p>F. 错误</p>
          </div>
        </div>

        <div class="pc-x pt-2 pl-4 scroll-mt-0" id="inline-blank">
          <div class="flex flex-wrap gap-2">
            <div class="flex flex-wrap gap-2 grow">
              <button type="button">
                <div class="text-xs">5-3</div>
              </button>
              <div class="font-bold">填空题：标准输出</div>
            </div>
          </div>
          <div class="mt-4">
            <h2>题目描述</h2>
            <p>请补全 C 语言中的标准输出语句：printf(    );</p>
            <p>函数名是 ________。</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
